<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>THEMODS</title>
<style>
  :root{
    --bg0:#070a12;--bg1:#0b1020;--card:rgba(18,24,44,.82);--stroke:rgba(255,255,255,.12);
    --shadow:0 18px 50px rgba(0,0,0,.55);--shadow2:0 4px 16px rgba(0,0,0,.3);
    --txt:#eaf0ff;--muted:#aebad5;--accent:#69a7ff;--accent2:#4fe2e2;
    --ok:#2dd4d4;--warn:#b78af7;--danger:#ff6b6b;
    --slot:rgba(18,24,44,.74);--slotStroke:rgba(255,255,255,.12);
    --radius:18px;--focus:rgba(105,167,255,.42);
  }
  @media(prefers-color-scheme:light){
    :root{
      --bg0:#dce8ff;--bg1:#eef3ff;--card:rgba(255,255,255,.92);--stroke:rgba(16,24,80,.18);
      --shadow:0 18px 50px rgba(16,24,80,.14);--shadow2:0 4px 16px rgba(16,24,80,.1);
      --txt:#06101f;--muted:#3a506e;--accent:#1a65d6;--accent2:#1aa8a8;
      --ok:#0d6e6e;--warn:#6b35c2;--danger:#b51e1e;
      --slot:rgba(255,255,255,.88);--slotStroke:rgba(16,24,80,.15);
    }
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{height:100%;height:100dvh;overflow:hidden;background:var(--bg0);}
  body{
    height:100%;height:100dvh;overflow:hidden;
    font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--txt);
    background:radial-gradient(1200px 900px at 20% 0%,rgba(47,125,246,.2),transparent 50%),
               radial-gradient(900px 700px at 90% 20%,rgba(56,198,198,.16),transparent 55%),
               linear-gradient(180deg,var(--bg0),var(--bg1));
    -webkit-font-smoothing:antialiased;
    padding-top:env(safe-area-inset-top,0px);
    padding-bottom:env(safe-area-inset-bottom,0px);
    display:flex;flex-direction:column;
  }

  /* ── SHARED COMPONENTS ── */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    border:1px solid var(--stroke);border-radius:12px;background:rgba(255,255,255,.07);
    color:var(--txt);cursor:pointer;font-weight:800;font-size:14px;
    padding:8px 16px;transition:background .15s;font-family:inherit;
  }
  .btn:hover{background:rgba(255,255,255,.14);}
  .btnDanger{background:rgba(255,107,107,.18)!important;border-color:rgba(255,107,107,.45)!important;color:var(--danger)!important;}
  .iconBtn{padding:6px 10px;font-size:15px;}
  .msg{font-size:13px;font-weight:700;min-height:18px;margin-top:6px;}
  .msg.ok{color:var(--ok);}
  .msg.warn{color:var(--warn);}
  .msg.err{color:var(--danger);}
  .msg.warn{color:var(--warn);}

  /* ── SCREENS ── */
  .tm-screen{
    flex:1 1 0;min-height:0;display:flex;flex-direction:column;
    max-width:680px;width:100%;margin:0 auto;padding:10px 10px 0;
  }
  .tm-card{
    flex:1 1 0;min-height:0;display:flex;flex-direction:column;
    background:var(--card);border:1px solid var(--stroke);border-radius:var(--radius);
    box-shadow:var(--shadow);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    overflow:hidden;
  }
  .tm-header{
    padding:12px 16px 10px;border-bottom:1px solid var(--stroke);flex-shrink:0;
    display:flex;flex-direction:column;gap:6px;align-items:center;
  }
  .tm-title{font-size:clamp(22px,5vw,30px);font-weight:950;letter-spacing:.1em;}
  .tm-title .t1{color:var(--txt);}
  .tm-title .t2{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .tm-nav{display:flex;align-items:center;gap:8px;}
  .tm-body{flex:1 1 0;min-height:0;overflow-y:auto;padding:14px 16px;-webkit-overflow-scrolling:touch;}

  /* ── HOME ── */
  .tm-home-msg{min-height:18px;}
  .tm-home-msg.ok{color:var(--ok);}
  .tm-home-subtitle{font-size:14px;color:var(--muted);text-align:center;margin-bottom:20px;}
  .tm-theme-grid{display:flex;flex-direction:column;gap:10px;}
  .tm-theme-card{
    border:1px solid var(--stroke);border-radius:14px;background:var(--slot);
    padding:16px 18px;cursor:pointer;transition:background .15s;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
  }
  .tm-theme-card:hover{background:rgba(105,167,255,.1);}
  .tm-theme-label{font-size:22px;font-weight:950;letter-spacing:.08em;color:var(--accent);}
  .tm-theme-desc{font-size:13px;color:var(--muted);margin-top:3px;}
  .tm-theme-arrow{font-size:20px;color:var(--muted);}

  /* ── THEME SCREEN ── */
  .tm-stats{display:flex;gap:12px;justify-content:center;margin-bottom:14px;flex-wrap:wrap;}
  .tm-stat{text-align:center;padding:8px 14px;border-radius:12px;background:var(--slot);border:1px solid var(--stroke);min-width:70px;}
  .tm-stat-n{display:block;font-size:22px;font-weight:950;color:var(--txt);}
  .tm-stat-l{display:block;font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
  .tm-due-stat .tm-stat-n{color:var(--warn);}
  .tm-next-btn{width:100%;justify-content:center;margin-bottom:16px;padding:12px;font-size:15px;}
  .tm-session-grid{display:flex;flex-wrap:wrap;gap:6px;}
  .tm-session-btn{
    border:1px solid var(--stroke);border-radius:10px;background:var(--slot);
    padding:7px 10px;cursor:pointer;font-family:inherit;
    display:flex;flex-direction:column;align-items:center;gap:2px;
    transition:background .12s;min-width:56px;
  }
  .tm-session-btn:hover{background:rgba(105,167,255,.12);}
  .tm-lbl{font-size:13px;font-weight:900;color:var(--txt);}
  .tm-cnt{font-size:10px;color:var(--muted);font-weight:700;}
  .tm-session-btn.tm-done{background:rgba(45,212,212,.12);border-color:rgba(45,212,212,.35);}
  .tm-session-btn.tm-done .tm-lbl{color:var(--ok);}
  .tm-session-btn.tm-due{background:rgba(183,138,247,.12);border-color:rgba(183,138,247,.35);}
  .tm-session-btn.tm-due .tm-lbl{color:var(--warn);}
  .tm-session-btn.tm-new{opacity:.65;}

  /* ── GAME SCREEN ── */
  .tm-game-header{
    padding:10px 16px 8px;border-bottom:1px solid var(--stroke);flex-shrink:0;
    display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
  }
  .tm-game-info{display:flex;flex-direction:column;gap:2px;}
  .tm-game-title{font-size:18px;font-weight:950;letter-spacing:.06em;color:var(--accent);}
  .tm-total{font-size:12px;color:var(--muted);}
  .tm-counter{font-size:20px;font-weight:900;font-variant-numeric:tabular-nums;}
  .tm-word-list{
    flex:1 1 0;min-height:0;overflow-y:auto;
    list-style:none;padding:8px 10px;
    display:flex;flex-direction:column;gap:5px;
    -webkit-overflow-scrolling:touch;
  }
  .tm-slot{
    min-height:34px;border:1px dashed var(--slotStroke);border-radius:999px;
    display:flex;align-items:center;padding:0 14px;
    font-size:14px;font-weight:900;letter-spacing:.06em;color:var(--txt);
  }
  .tm-slot.tm-found{
    border:1px solid rgba(45,212,212,.5);
    background:rgba(45,212,212,.1);
  }
  .tm-slot.tm-revealed{
    border:1px solid rgba(255,107,107,.45);
    background:rgba(255,107,107,.08);
    color:var(--muted);
  }
  /* inputCard desktop */
  .tm-input-card{
    flex-shrink:0;padding:8px 10px;border-top:1px solid var(--stroke);
    background:rgba(255,255,255,.04);border-radius:0 0 var(--radius) var(--radius);
  }
  @media(prefers-color-scheme:light){.tm-input-card{background:rgba(255,255,255,.55);}}
  .tm-controls{display:flex;gap:8px;align-items:center;}
  .tm-controls input{
    flex:1 1 0;padding:8px 12px;border-radius:12px;border:1px solid var(--stroke);
    background:rgba(255,255,255,.7);color:var(--txt);font-size:15px;
    outline:none;text-transform:uppercase;font-family:inherit;
  }
  @media(prefers-color-scheme:dark){.tm-controls input{background:rgba(18,24,44,.78);}}
  .tm-controls input:focus{box-shadow:0 0 0 4px var(--focus);}

  /* ── CLAVIER MOBILE ── */
  .tm-keyboard{display:none;}
  @media(max-width:640px){
    .tm-input-card{display:none!important;}
    body{
      padding-top:env(safe-area-inset-top,0px);
      padding-bottom:env(safe-area-inset-bottom,0px);
    }
    .tm-keyboard{
      flex-shrink:0;display:flex;flex-direction:column;
      background:#1a2235;border-top:1px solid var(--stroke);
      padding:0 5px 6px;gap:4px;
    }
    @media(prefers-color-scheme:light){.tm-keyboard{background:#d0daf0;}}
    .kbTopBar{display:flex;align-items:center;gap:6px;padding:3px 2px 2px;}
    .kbDisplay{
      flex:1 1 0;min-height:30px;background:var(--card);border:1px solid var(--stroke);
      border-radius:8px;display:flex;align-items:center;padding:0 10px;
      font-size:16px;font-weight:800;letter-spacing:.08em;color:var(--txt);text-transform:uppercase;
    }
    .kbDisplay:empty::after{content:"…";color:var(--muted);font-weight:400;font-size:13px;letter-spacing:0;}
    .kbMsg{font-size:11px;font-weight:700;min-height:14px;padding:0 4px;text-align:center;}
    .kbMsg.ok{color:var(--ok);}.kbMsg.warn{color:var(--warn);}.kbMsg.err{color:var(--danger);}.kbMsg.hj{color:var(--muted);}
    .kbRows{display:flex;flex-direction:column;gap:4px;}
    .kbRow{display:flex;justify-content:center;gap:3px;}
    .kbKey{
      flex:1 1 0;max-width:33px;height:34px;border-radius:7px;border:0;
      background:#2d3a55;color:var(--txt);font-size:14px;font-weight:700;
      box-shadow:0 2px 0 rgba(0,0,0,.4);display:flex;align-items:center;
      justify-content:center;user-select:none;-webkit-user-select:none;
    }
    @media(prefers-color-scheme:light){.kbKey{background:#fff;color:#0b1220;box-shadow:0 2px 0 rgba(0,0,0,.25);}}
    .kbKey:active{background:var(--accent);color:#fff;transform:translateY(1px);box-shadow:none;}
    .kbWide{max-width:48px;font-size:12px;}
    .kbEnter{background:var(--accent);color:#fff;max-width:48px;}
    .kbClear{background:rgba(181,30,30,.35);color:#ff9a9a;}
    /* game screen scroll */
    #tm-screen-game .tm-card{border-radius:0;}
    #tm-screen-game .tm-word-list{overflow-y:auto;}
  }
</style>
</head>
<body>

<!-- ══ HOME ══ -->
<div id="tm-screen-home" class="tm-screen">
  <div class="tm-card">
    <div class="tm-header">
      <div class="tm-title"><span class="t1">THE</span><span class="t2">MODS</span></div>
    </div>
    <div class="tm-body">
      <p class="tm-home-subtitle">Thèmes de révision · ODS9</p>
      <div class="tm-theme-grid">
        <div class="tm-theme-card" data-theme="age">
          <div>
            <div class="tm-theme-label">-AGE</div>
            <div class="tm-theme-desc">1 311 mots · 360 sessions</div>
          </div>
          <span class="tm-theme-arrow">›</span>
        </div>
        <div class="tm-theme-card" data-theme="vi">
          <div>
            <div class="tm-theme-label">V.I.</div>
            <div class="tm-theme-desc">575 verbes intransitifs (p.p. inv.) · 193 sessions</div>
          </div>
          <span class="tm-theme-arrow">›</span>
        </div>
        <div class="tm-theme-card" data-theme="oir">
          <div>
            <div class="tm-theme-label">-OIR</div>
            <div class="tm-theme-desc">253 mots · 99 sessions</div>
          </div>
          <span class="tm-theme-arrow">›</span>
        </div>
        <div class="tm-theme-card" data-theme="able">
          <div>
            <div class="tm-theme-label">-ABLE</div>
            <div class="tm-theme-desc">311 mots · 138 sessions</div>
          </div>
          <span class="tm-theme-arrow">›</span>
        </div>
        <div class="tm-theme-card" data-theme="ique">
          <div>
            <div class="tm-theme-label">-IQUE</div>
            <div class="tm-theme-desc">629 mots · 177 sessions</div>
          </div>
          <span class="tm-theme-arrow">›</span>
        </div>
      <p class="tm-home-msg" style="text-align:center;font-size:13px;font-weight:700;min-height:18px;margin-top:8px;"></p>
      </div>
    </div>
  </div>
  <div style="text-align:center;padding:10px 0;">
    <a href="index.html" style="color:var(--muted);font-size:13px;text-decoration:none;font-weight:700;">← Retour à METHODS</a>
  </div>
</div>

<!-- ══ GAME SCREEN ══ -->
<div id="tm-screen-game" class="tm-screen" style="display:none;">
  <div class="tm-card">
    <div class="tm-game-header">
      <div class="tm-game-info">
        <div id="tm-game-title" class="tm-game-title"></div>
        <div id="tm-total" class="tm-total"></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span id="tm-counter" class="tm-counter">0 / 0</span>
        <button id="tm-game-btn" class="btn btnDanger" type="button">Solutions</button>
      </div>
    </div>

    <ul id="tm-word-list" class="tm-word-list"></ul>

    <!-- Desktop input -->
    <div class="tm-input-card">
      <div class="tm-controls">
        <input id="tm-saisie" type="text" inputmode="text" autocomplete="off"
          autocapitalize="characters" autocorrect="off" spellcheck="false" placeholder="Saisie"/>
      </div>
      <div class="msg" id="tm-msg"></div>
    </div>
  </div>

  <!-- Mobile keyboard -->
  <div id="tm-keyboard" class="tm-keyboard">
    <div class="kbTopBar">
      <div id="tm-kbDisplay" class="kbDisplay"></div>
    </div>
    <div class="kbMsg" id="tm-kbMsg"></div>
    <div class="kbRows">
      <div class="kbRow">
        <button class="kbKey" data-key="A">A</button><button class="kbKey" data-key="Z">Z</button><button class="kbKey" data-key="E">E</button><button class="kbKey" data-key="R">R</button><button class="kbKey" data-key="T">T</button><button class="kbKey" data-key="Y">Y</button><button class="kbKey" data-key="U">U</button><button class="kbKey" data-key="I">I</button><button class="kbKey" data-key="O">O</button><button class="kbKey" data-key="P">P</button>
      </div>
      <div class="kbRow">
        <button class="kbKey" data-key="Q">Q</button><button class="kbKey" data-key="S">S</button><button class="kbKey" data-key="D">D</button><button class="kbKey" data-key="F">F</button><button class="kbKey" data-key="G">G</button><button class="kbKey" data-key="H">H</button><button class="kbKey" data-key="J">J</button><button class="kbKey" data-key="K">K</button><button class="kbKey" data-key="L">L</button><button class="kbKey" data-key="M">M</button>
      </div>
      <div class="kbRow">
        <button class="kbKey kbWide kbClear" data-key="CLEAR">✕</button><button class="kbKey kbWide" data-key="SUPPR">⌫</button><button class="kbKey" data-key="W">W</button><button class="kbKey" data-key="X">X</button><button class="kbKey" data-key="C">C</button><button class="kbKey" data-key="V">V</button><button class="kbKey" data-key="B">B</button><button class="kbKey" data-key="N">N</button><button class="kbKey kbWide kbEnter" data-key="ENTER">OK</button>
      </div>
    </div>
  </div>

  <div style="text-align:center;padding:6px 0;flex-shrink:0;">
    <button id="tm-back-theme" class="btn" style="font-size:12px;padding:5px 12px;">← Retour aux sessions</button>
  </div>
</div>

<script src="themods_data.js"></script>
<script src="themods.js"></script>
</body>
</html>
